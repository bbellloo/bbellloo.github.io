<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽抽樂</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('https://cdn.discordapp.com/attachments/1105202386240282705/1105930840313180260/3_.png?ex=66a4999b&is=66a3481b&hm=872eeb6fa3586f71c92617bd0ecfc0d240255f420a765641bd1910d22cd20608&');
            background-size: cover;
            background-position: center;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
        }
        .lottery-item {
            cursor: pointer;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lottery-item"><img src="https://i.postimg.cc/7hckFtT8/01.png" alt="抽抽樂圖片1" data-prize="依依的抱枕"></div>
        <div class="lottery-item"><img src="https://i.postimg.cc/pV1R5rcG/02.png" alt="抽抽樂圖片2" data-prize="依依的杯墊"></div>
        <div class="lottery-item"><img src="https://i.postimg.cc/VkX8hRfp/03.png" alt="抽抽樂圖片3" data-prize="依依的杯套"></div>
        <div class="lottery-item"><img src="https://i.postimg.cc/65kKzSXC/04.png" alt="抽抽樂圖片4" data-prize="依依的立牌"></div>
        <div class="lottery-item"><img src="https://i.postimg.cc/Qx9sQDRX/05.png" alt="抽抽樂圖片5" data-prize="依依的驚喜"></div>
        <div class="lottery-item"><img src="https://i.postimg.cc/HLHg1yjx/06.png" alt="抽抽樂圖片6" data-prize="好啦我想不到還有甚麼禮物了救我w"></div>
    </div>

    <script>
        document.querySelectorAll('.lottery-item img').forEach(function(img) {
            img.addEventListener('click', function() {
                // 獲取自訂的獎項信息
                const selectedPrize = this.getAttribute('data-prize');

                // 隱藏圖片
                this.style.display = 'none';

                // 彈出視窗顯示獎項
                const customMessage = '恭喜你！你中獎了！\n' + selectedPrize;
                showAlert(customMessage);
            });
        });

        function showAlert(message) {
            // 使用自訂的彈出視窗
            const alertBox = document.createElement('div');
            alertBox.style.position = 'fixed';
            alertBox.style.top = '50%';
            alertBox.style.left = '50%';
            alertBox.style.transform = 'translate(-50%, -50%)';
            alertBox.style.backgroundColor = 'white';
            alertBox.style.padding = '20px';
            alertBox.style.border = '2px solid black';
            alertBox.style.borderRadius = '10px';
            alertBox.style.zIndex = '1000';
            alertBox.innerText = message;

            const closeButton = document.createElement('button');
            closeButton.innerText = '關閉';
            closeButton.style.marginTop = '10px';
            closeButton.addEventListener('click', function() {
                document.body.removeChild(alertBox);
            });

            alertBox.appendChild(closeButton);
            document.body.appendChild(alertBox);
        }
    </script>
</body>
</html>
